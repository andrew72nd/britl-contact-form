<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: transparent; padding: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #555; }
    </style>
</head>
<body>
    <form action="https://formspree.io/f/xdawyjyp" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="_replyto" placeholder="Your Email" required>
        <textarea name="message" placeholder="Tell me about your project..." rows="5" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</body>
</html>
